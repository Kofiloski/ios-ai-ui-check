name: Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: Semantic version tag to create, for example v0.3.0
        required: true
        type: string
      update_major_tag:
        description: Also force-update the moving major tag, for example v0
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release source
        shell: bash
        env:
          CURRENT_REF: ${{ github.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [[ -z "${DEFAULT_BRANCH}" || "${CURRENT_REF}" != "refs/heads/${DEFAULT_BRANCH}" ]]; then
            echo "Releases must run from the repository default branch (${DEFAULT_BRANCH:-unknown})." >&2
            exit 1
          fi

      - name: Validate release tag
        id: version
        shell: bash
        env:
          VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          if [[ ! "${VERSION_TAG}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "version_tag must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi

          echo "major_tag=v${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"

      - name: Run release readiness
        shell: bash
        env:
          VERSION_TAG: ${{ inputs.version_tag }}
        run: ./scripts/check-release-readiness.sh "${VERSION_TAG}"

      - name: Configure git author
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release tag
        shell: bash
        env:
          VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION_TAG}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${VERSION_TAG}:refs/tags/${VERSION_TAG}"
            existing_commit="$(git rev-list -n 1 "${VERSION_TAG}")"
            target_commit="$(git rev-parse HEAD)"
            if [[ "${existing_commit}" != "${target_commit}" ]]; then
              echo "Tag ${VERSION_TAG} already exists on a different commit." >&2
              exit 1
            fi

            echo "Tag ${VERSION_TAG} already points to the release commit; continuing."
            exit 0
          fi

          git tag -fa "${VERSION_TAG}" -m "Release ${VERSION_TAG}"
          git push origin "refs/tags/${VERSION_TAG}"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          if gh release view "${VERSION_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${VERSION_TAG} already exists; continuing."
            exit 0
          fi

          gh release create "${VERSION_TAG}" \
            --title "${VERSION_TAG}" \
            --generate-notes

      - name: Update moving major tag
        if: ${{ inputs.update_major_tag }}
        shell: bash
        env:
          VERSION_TAG: ${{ inputs.version_tag }}
          MAJOR_TAG: ${{ steps.version.outputs.major_tag }}
        run: |
          target_commit="$(git rev-parse HEAD)"
          if git ls-remote --exit-code --tags origin "refs/tags/${MAJOR_TAG}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${MAJOR_TAG}:refs/tags/${MAJOR_TAG}"
            existing_commit="$(git rev-list -n 1 "${MAJOR_TAG}")"
            if [[ "${existing_commit}" == "${target_commit}" ]]; then
              echo "Moving tag ${MAJOR_TAG} already points to the release commit; continuing."
              exit 0
            fi
          fi

          git tag -fa "${MAJOR_TAG}" -m "Release ${VERSION_TAG}"
          git push origin "refs/tags/${MAJOR_TAG}" --force
